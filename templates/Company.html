<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Registration - Step 3</title>
<link rel="stylesheet" href="{% static 'css/company.css' %}?v=1">
</head>
<body>
  <div class="company-shell">
    <header class="company-header">
      <div>
        <p class="crumbs">
          <a href="{% url 'index-html' %}">Dashboard</a> /
          <a href="{% url 'crmhome' %}">Property</a> /
          Agent Registration
        </p>
        <h1>New Agent Registration</h1>
        <p class="subtitle">Complete all sections to register a new real estate agent.</p>
      </div>
      <div class="header-actions">
        <a class="header-btn secondary" href="{% url 'crmhome' %}">Go to Property</a>
        <a class="header-btn" href="{% url 'index-html' %}">Back to Dashboard</a>
      </div>
    </header>

    <div class="tabs">
      <div class="tab" onclick="window.location='/Agent.html'">Personal</div>
      <div class="tab" onclick="window.location='/professional.html'">Professional</div>
      <div class="tab active">Company</div>
    </div>

    <section class="card">
      <div class="step-row">
        <div class="step-chip">Step 3</div>
        <h3>Company Information</h3>
      </div>

      <form>
        <div class="field">
          <label>Company / Brokerage Name *</label>
          <input type="text" placeholder="ABC Realty Group">
        </div>

        <div class="field">
          <label>Office Address *</label>
          <input type="text" placeholder="123 Main Street, Suite 100">
        </div>

        <div class="form-grid three">
          <div class="field">
            <label>City *</label>
            <input type="text" placeholder="Los Angeles">
          </div>
          <div class="field">
            <label>State *</label>
            <input type="text" placeholder="CA">
          </div>
          <div class="field">
            <label>Zip Code *</label>
            <input type="text" placeholder="90001">
          </div>
        </div>

        <div class="field">
          <label>Professional Bio</label>
          <textarea placeholder="Tell us about your experience, achievements, and what makes you stand out as a real estate agent."></textarea>
        </div>

        <div class="actions">
          <button type="button" class="prev-btn" onclick="window.location='/professional.html'">Previous</button>
          <button type="submit" class="submit-btn">Submit Registration</button>
        </div>
      </form>
    </section>
  </div>
</body>
</html>
