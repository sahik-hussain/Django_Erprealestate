<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Register</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="page-wrapper">
        <div class="login-container">
            <div class="login-form-side">
                <div class="brand">
                    <div class="brand-logo">
                        <img src="{% static 'images/crimson1.jpg.png' %}" class="logo-icon" alt="Crimson">
                    </div>
                    <span class="brand-name">Crimson</span>
                </div>

                <h2>Create Account</h2>
                <p class="subtitle">Register a new user account</p>

                {% if error %}
                <p style="color:#b42318; margin:0 0 10px;">{{ error }}</p>
                {% endif %}

                <form action="{% url 'register-page' %}" method="post">
                    {% csrf_token %}
                    <div class="input-field">
                        <label>First Name</label>
                        <input type="text" name="first_name">
                    </div>
                    <div class="input-field">
                        <label>Last Name</label>
                        <input type="text" name="last_name">
                    </div>
                    <div class="input-field">
                        <label>Username *</label>
                        <input type="text" name="username" required>
                    </div>
                    <div class="input-field">
                        <label>Email *</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="input-field">
                        <label>Phone Number</label>
                        <input type="text" name="phone">
                    </div>
                    <div class="input-field">
                        <label>Password *</label>
                        <input type="password" name="password" required>
                    </div>
                    <div class="input-field">
                        <label>Confirm Password *</label>
                        <input type="password" name="confirm_password" required>
                    </div>

                    <button type="submit" class="login-submit">Register & Login</button>
                </form>
                <p class="signup-prompt">Already have an account? <a href="{% url 'login-page' %}">Login</a></p>
            </div>
            <div class="login-image-side">
                <img src="{% static 'images/loginimage.jpg.png' %}" class="login-img" alt="register">
            </div>
        </div>
    </div>
</body>
</html>
